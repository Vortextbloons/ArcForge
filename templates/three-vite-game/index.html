<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArcForge Game</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
        overflow: hidden;
      }
      #root {
        width: 100vw;
        height: 100vh;
      }
      #game {
        display: block;
        width: 100%;
        height: 100%;
      }
      #error {
        position: fixed;
        left: 12px;
        bottom: 12px;
        color: #f88;
        font: 12px/1.4 monospace;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <canvas id="game"></canvas>
    </div>
    <div id="error"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
